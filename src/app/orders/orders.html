<div class="p-3">
  <div class="card">
    <div class="card-body">
      @if (orders){
        <table class="table table-striped">
          <thead><tr><th>ID</th><th>Date creation</th><th>Status</th><th>Customer ID</th></tr></thead>
          <tbody>
            @for (o of orders._embedded.orders; track $index){
              <tr>
                <td>{{o.id}}</td>
                <td>{{o.createdAt}}</td>
                <td>{{o.status}}</td>
                <td>{{o.customerId}}</td>
                <td>
                  <button class="btn btn-success" (click)="getOrderDetails(o)">Order Details</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      }
    </div>
  </div>
</div>
